name: Sync to Hugging Face Space

# Mirrors main to the Hugging Face Space so the production node (app.py +
# Dockerfile, README front-matter already declares sdk:docker/app_port:7860)
# redeploys on every merge.
#
# One-time setup (repo Settings):
#   - Secret  HF_TOKEN (or NOUGENSHARDS_HGF_KEY3): a Hugging Face token with write access
#     to the Space (fine-grained, scoped to that one repo)
#   - Variable HF_SPACE: the Space id, e.g. "nougenai/NouGenShards"
# Until both are configured the job skips gracefully.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't leave the GITHUB_TOKEN in .git/config; this job pushes with
          # its own credential and needs no further GitHub auth.
          persist-credentials: false
      - name: Push snapshot to Space
        env:
          # Either secret name works; HF_TOKEN wins if both are set.
          HF_TOKEN: ${{ secrets.HF_TOKEN || secrets.NOUGENSHARDS_HGF_KEY3 }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "HF token secret (HF_TOKEN or NOUGENSHARDS_HGF_KEY3) and/or HF_SPACE variable not set - skipping Space sync."
            exit 0
          fi
          # HF's pre-receive hook scans EVERY object in the pushed history and
          # rejects binary blobs that are not stored via Git LFS - so pushing
          # the real history fails on old commits containing docs/images/*.png
          # even when the tip is fine. The Space doesn't need history: build a
          # single orphan snapshot commit of the current tree with all image
          # binaries tracked as LFS, and force-push only that.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install --local
          git checkout --orphan hf-deploy
          cat >> .gitattributes <<'EOF'
          *.png filter=lfs diff=lfs merge=lfs -text
          *.jpg filter=lfs diff=lfs merge=lfs -text
          *.jpeg filter=lfs diff=lfs merge=lfs -text
          *.gif filter=lfs diff=lfs merge=lfs -text
          *.ico filter=lfs diff=lfs merge=lfs -text
          *.icns filter=lfs diff=lfs merge=lfs -text
          *.webp filter=lfs diff=lfs merge=lfs -text
          EOF
          # Bake the source sha into the snapshot; /health reports it, and the
          # verify step below waits for it - proving the NEW build booted.
          echo "${GITHUB_SHA}" > .deploy_sha
          # Re-stage the whole tree so the LFS attributes apply to the images.
          # -f: the .gitattributes append above makes it differ from the index,
          # which plain `git rm --cached` refuses to drop.
          git rm -r --cached -q -f .
          git add -A
          git commit -qm "Space deploy: snapshot of ${GITHUB_SHA}"
          # Force-push is the HF-documented pattern: the Space mirror's history
          # is owned entirely by this repo.
          git push --force "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" HEAD:main
      - name: Verify deployed node boots
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN || secrets.NOUGENSHARDS_HGF_KEY3 }}
          HF_SPACE: ${{ vars.HF_SPACE }}
          # Optional override if the auto-derived subdomain ever mismatches.
          HF_SPACE_HOST: ${{ vars.HF_SPACE_HOST }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "Secrets not configured - nothing was deployed, skipping verification."
            exit 0
          fi
          # owner/Name -> owner-name (HF Space subdomain convention).
          HOST="${HF_SPACE_HOST:-$(echo "$HF_SPACE" | tr '[:upper:]' '[:lower:]' | tr '/_.' '---')}"
          URL="https://${HOST}.hf.space/health"
          echo "Waiting for ${URL} to report deploy_sha ${GITHUB_SHA} (Docker rebuild takes a few minutes)..."
          # The bearer token authenticates us at HF's edge, so this works while
          # the Space is PRIVATE - every deploy is verified before going public.
          for i in $(seq 1 60); do
            body=$(curl -sS -m 15 -H "Authorization: Bearer ${HF_TOKEN}" "$URL" 2>/dev/null || true)
            if echo "$body" | grep -q "${GITHUB_SHA}"; then
              echo "Node is up on the new build:"
              echo "$body"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Node did not report the new deploy sha within 10 minutes. Last response: ${body:-<none>}"
          exit 1
