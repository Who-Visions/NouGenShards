name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:

jobs:
  python:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Full range declared by pyproject's requires-python = ">=3.10".
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test tooling
        # Installing the package itself (-e .) exercises pyproject's declared
        # dependencies - a missing dep (like the once-undeclared numpy) now
        # fails CI instead of being papered over by a manual install list.
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check src tests
      - name: Run pytest
        # pythonpath is set in pyproject [tool.pytest.ini_options]; no manual
        # PYTHONPATH prefix needed.
        run: python -m pytest tests -q

  typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Test
        # Shell-expanded single-level glob (test files are flat in dist/test/),
        # avoiding node's version-dependent "**" glob support.
        run: node --test dist/test/*.test.js
